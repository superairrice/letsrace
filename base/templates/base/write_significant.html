<!DOCTYPE html>
{% load static %}
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- <link rel="shortcut icon" href="assets/favicon.ico" type="image/x-icon" /> -->
  
  <link rel="stylesheet" href="{% static 'styles/style.css' %}" />
  <link rel="stylesheet" href="{% static 'styles/styles.css' %}" />

  <script src="{% static 'js/script.js' %}"></script>

  <script src="{% static 'js/jquery-3.6.1.js' %}"></script>

  <title>📘&nbsp;경주 메모</title>

  <style>
    body.memo-page {
      margin: 0;
      padding: 0.8rem;
    }

    body.memo-page .container {
      width: 100%;
      max-width: 920px;
      margin: 0 auto;
    }

    body.memo-page .roomList {
      width: 100%;
      border-radius: 10px;
      overflow: hidden;
    }

    .memo-head {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.8rem;
      font-style: italic;
      font-size: 1.45rem;
      line-height: 1.3;
    }

    .memo-head__horse { color: var(--color-r3); }
    .memo-head__date { color: var(--color-main); }
    .memo-head__title { color: var(--color-light); font-style: normal; }

    .memo-form {
      display: grid;
      gap: 0.66rem;
    }

    .memo-row {
      display: grid;
      grid-template-columns: 9.2rem minmax(0, 1fr);
      gap: 0.55rem;
      align-items: center;
      background: rgba(109, 123, 161, 0.25);
      border-radius: 6px;
      padding: 0.5rem 0.55rem;
    }

    .memo-label {
      font-size: 1.2rem;
      color: var(--color-light-gray);
      white-space: nowrap;
    }

    .memo-control select,
    .memo-control textarea {
      width: 100%;
      font-size: 1.18rem;
      border-radius: 5px;
      border: 1px solid rgba(130, 149, 176, 0.54);
      padding: 0.34rem 0.5rem;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    .memo-control textarea {
      resize: vertical;
      min-height: 6.5rem;
      line-height: 1.4;
    }

    .memo-control textarea.memo-horse {
      min-height: 3rem;
      background-color: var(--color-main-hover);
    }

    .memo-actions {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding-top: 0.2rem;
    }

    @media (max-width: 760px) {
      body.memo-page {
        padding: 0.45rem;
      }

      .memo-row {
        grid-template-columns: 1fr;
        gap: 0.4rem;
      }

      .memo-label {
        font-size: 1.08rem;
      }

      .memo-control select,
      .memo-control textarea {
        font-size: 1.05rem;
      }
    }
  </style>

</head>

{% block content %}

<body class="memo-page">
<div class="container">
  <div class="roomList" style="height: auto;">

    <div class="room__top" style="border-radius: 7px;">
      <div class="room__topLeft memo-head">
        <span class="memo-head__horse">🐴&nbsp;{{horse}}</span>
        <span class="memo-head__date">{{rdate|slice:"0:4"}}.{{rdate|slice:"4:6"}}.{{rdate|slice:"6:8"}}</span>
        <span class="memo-head__title">경주 메모</span>
      </div>
    
    </div>

    <hr style="border: solid 1px black;">

    <form class="memo-form" action="" method="POST">
      {% csrf_token %}
      <label class="memo-row">
        <div class="memo-label">📚&nbsp;Start :</div>
        <div class="memo-control">
        <select name="start">
          <option value="-" {% if start == '-' %} selected {% endif %}>&nbsp;</option>
          {% for cd_type, r_code, r_name in race_cd %}
          {% if cd_type == 'R1' %}
          <option value="{{r_code}}" {% if r_code == r_significant.0.0 %} selected {% endif %}>{{r_name}}</option>
          {% endif %}
          {% endfor %}
        </select>
        </div>
      </label>

      <label class="memo-row">
        <div class="memo-label">📚&nbsp;Corners :</div>
        <div class="memo-control">
        <select name="corners">
          <option value="-" {% if corners == '-' %} selected {% endif %}>&nbsp;</option>
          {% for cd_type, r_code, r_name in race_cd %}
          {% if cd_type == 'R2' %}
          <option value="{{r_code}}" {% if r_code == r_significant.0.1 %} selected {% endif %}>{{r_name}}</option>
          {% endif %}
          {% endfor %}
        </select>
        </div>
      </label>

      <label class="memo-row">
        <div class="memo-label">📚&nbsp;Finish :</div>
        <div class="memo-control">
        <select name="finish">
          <option value="-" {% if finish == '-' %} selected {% endif %}>&nbsp;</option>
          {% for cd_type, r_code, r_name in race_cd %}
          {% if cd_type == 'R3' %}
          <option value="{{r_code}}" {% if r_code == r_significant.0.2 %} selected {% endif %}>{{r_name}}</option>
          {% endif %}
          {% endfor %}
        </select>
        </div>
      </label>
      <label class="memo-row">
        <div class="memo-label">📚&nbsp;Wrap up :</div>
        <div class="memo-control">
        <select name="wrapup">
          <option value="-" {% if wrapup == '-' %} selected {% endif %}>&nbsp;</option>
          {% for cd_type, r_code, r_name in race_cd %}
          {% if cd_type == 'R4' %}
          <option value="{{r_code}}" {% if r_code == r_significant.0.3 %} selected {% endif %}>{{r_name}}</option>
          {% endif %}
          {% endfor %}
        </select>
        </div>
      </label>

      <label class="memo-row">
        <div class="memo-label">📚&nbsp;Etc. :</div>
        <div class="memo-control">
          <textarea name="r_etc" rows="10" placeholder="Enter Your Text Here by Replacing it">
            {% if r_significant.0.4 %}{{r_significant.0.4}}{% else %}&nbsp;{% endif %}
          </textarea>
        </div>
      </label>

      <label class="memo-row">
        <div class="memo-label">📚&nbsp;제외 사유 :</div>
        <div class="memo-control">
        <select name="r_flag">
          <!-- <option value="0" {% if r_flag == '0' %} selected {% endif %}>&nbsp;</option> -->
          {% for cd_type, r_code, r_name in race_cd %}
          {% if cd_type == 'R0' %}
          <option value="{{r_code}}" {% if r_code == r_significant.0.5 %} selected {% endif %}>{{r_code}}&nbsp;&nbsp;&nbsp;{{r_name}}</option>
          {% endif %}
          {% endfor %}
        </select>
        </div>
      </label>

      <label class="memo-row">
        <div class="memo-label">📚&nbsp;Horse :</div>
        <div class="memo-control">
          <textarea class="memo-horse" name="h_memo" rows="2" placeholder="Enter Your Text Here by Replacing it">
            {% if h_memo.0.0 %}{{h_memo.0.0}}{% else %}&nbsp;{% endif %}
          </textarea>
        </div>
      </label>
      
      <div class="memo-actions">
        <button class="btn btn--link" type="submit">💾&nbsp;Save</button>
        <a class="btn btn--dark" onclick="window.close()">Close</a>
      </div>

    </form>


  </div>
</div>

 </body>


{% endblock content %}
